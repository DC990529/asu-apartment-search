<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASU Tempe 租屋地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
#lockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
#lockScreen h1{font-size:28px;color:#333}
#lockScreen p{color:#888;font-size:14px}
#lockScreen input{margin-bottom:6px;padding:12px 20px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;width:280px;text-align:center;outline:none;transition:border .2s}
#lockScreen input:focus{border-color:#4caf50}
#lockScreen button{padding:12px 40px;background:#4caf50;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
#lockScreen button:hover{background:#388e3c}
#lockScreen .err{color:#f44336;font-size:13px;min-height:20px}
#lockScreen .hint{color:#bbb;font-size:12px}
#map{width:100%;height:100vh;display:none}
.m-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.m-rating{font-size:10px;font-weight:700;background:rgba(255,255,255,.92);padding:1px 4px;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.2);white-space:nowrap;line-height:1.2}
.m-icon{display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:50%;width:30px;height:30px;box-shadow:0 2px 6px rgba(0,0,0,.35);border:2.5px solid #fff;cursor:pointer;transition:transform .15s}
.m-icon:hover{transform:scale(1.3)}
.c-triple{background:#4caf50}.c-double{background:#ff9800}
.fbar{position:fixed;top:10px;left:50px;z-index:1000;background:rgba(255,255,255,.96);border-radius:12px;padding:10px 16px;box-shadow:0 2px 12px rgba(0,0,0,.12);display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-size:13px;backdrop-filter:blur(8px);display:none}
.fbar label{cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.fbar .div{width:1px;height:28px;background:#ddd}
.range-group{display:flex;flex-direction:column;gap:2px;min-width:160px}
.range-group .range-label{font-size:11px;color:#666;display:flex;justify-content:space-between}
.range-group .range-label span{font-weight:700;color:#2e7d32;font-size:12px}
.range-group input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#4caf50,#ff9800,#f44336);outline:none;cursor:pointer}
.range-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #4caf50;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sbox{position:fixed;top:10px;right:10px;z-index:1000;background:rgba(255,255,255,.96);border-radius:10px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,.12);backdrop-filter:blur(8px);display:none}
.sbox input{border:1px solid #e0e0e0;padding:7px 10px;border-radius:6px;width:180px;font-size:13px;outline:none}
.sbox input:focus{border-color:#4caf50}
.sb{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);overflow-y:auto;transition:right .3s cubic-bezier(.4,0,.2,1);z-index:1001;padding:24px}
.sb.open{right:0}
.sb-close{position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:#999}
.sb h2{font-size:20px;margin-bottom:4px;padding-right:40px;line-height:1.3}
.sb .addr{color:#888;font-size:13px;margin-bottom:14px}
.sb .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sb .card{background:#f8f9fa;padding:10px;border-radius:8px}
.sb .card .lb{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.sb .card .vl{font-size:14px;font-weight:600;margin-top:2px}
.sb .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.sb .tag{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500}
.tg{background:#e8f5e9;color:#2e7d32}.to{background:#fff3e0;color:#e65100}.tr{background:#ffebee;color:#c62828}.tb{background:#e3f2fd;color:#1565c0}.tgold{background:#fff8e1;color:#f57f17;border:1px solid #ffd54f}
.sb .acts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sb .btn{display:block;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-weight:600;font-size:14px}
.btn-p{background:#1976d2;color:#fff}.btn-c{background:#2e7d32;color:#fff}.btn-s{background:#f5f5f5;color:#333;border:1px solid #e0e0e0}
.sb .note{padding:10px;background:#fffde7;border-radius:8px;font-size:12px;color:#666;line-height:1.5;margin-bottom:8px}
.sb .conf{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:500}
.conf-t{background:#e8f5e9;color:#2e7d32}.conf-d{background:#fff3e0;color:#e65100}
.leaflet-popup-content{margin:8px 12px;min-width:200px}
.pt{font-weight:700;font-size:14px;margin-bottom:3px}.pp{color:#2e7d32;font-weight:600;font-size:13px}.pd{font-size:11px;color:#666;margin-top:3px;line-height:1.5}
.pb{display:inline-block;margin-top:6px;padding:5px 14px;background:#1976d2;color:#fff;border-radius:5px;font-size:11px;cursor:pointer;border:none;font-weight:600}
.legend{background:rgba(255,255,255,.95);padding:12px 16px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-size:12px;line-height:2;backdrop-filter:blur(8px)}
.legend h4{font-size:13px;margin-bottom:4px}.legend-dot{width:14px;height:14px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);vertical-align:middle;margin-right:6px}
@media(max-width:768px){.sb{width:100%;right:-100%}.fbar{left:8px;right:8px;top:auto;bottom:8px;justify-content:center;font-size:11px}.sbox{top:8px;left:50px;right:8px}.sbox input{width:100%}}
</style>
</head>
<body>
<div id="lockScreen">
  <h1>&#x1f512; ASU Tempe 租屋地圖</h1>
  <p>此頁面需要密碼才能查看</p>
  <input type="text" id="usrInput" placeholder="帳號..." autofocus><input type="password" id="pwInput" placeholder="密碼...">
  <button onclick="tryUnlock()">解鎖</button>
  <div class="err" id="errMsg"></div>
  <div class="hint">114 個物件 · 雙重驗證 · DC & GF 專用</div>
</div>
<div id="map"></div>
<div class="fbar" id="fbar">
  <label><input type="checkbox" checked class="fc" value="triple"> &#x1f7e2;三重驗證</label>
  <label><input type="checkbox" checked class="fc" value="double"> &#x1f7e1;雙重驗證</label>
  <span class="div"></span>
  <div class="range-group">
    <div class="range-label">Studio/1B上限：<span id="r1v">$1,400</span></div>
    <input type="range" id="r1" min="600" max="2500" value="1400" step="50">
  </div>
  <div class="range-group">
    <div class="range-label">2B2B上限：<span id="r2v">$1,800</span></div>
    <input type="range" id="r2" min="800" max="3000" value="1800" step="50">
  </div>
  <span class="div"></span>
  <div class="range-group" style="min-width:130px">
    <div class="range-label">⭐最低：<span id="r3v">0星</span></div>
    <input type="range" id="r3" min="0" max="48" value="0" step="1" style="background:linear-gradient(to right,#f44336,#ff9800,#4caf50)">
  </div>
  <span class="div"></span>
  <label><input type="checkbox" id="ff"> &#x1f6cb;&#xfe0f; 有傢俱</label>
  <label><input type="checkbox" id="fw"> &#x1f4f6; WiFi含</label>
</div>
<div class="sbox" id="sbox"><input type="text" id="sq" placeholder="&#x1f50d; 搜尋物件名稱或地址..."></div>
<div class="sb" id="sb"><button class="sb-close" onclick="closeSB()">&#215;</button><div id="sc"></div></div>

const USR_HASH="ZGMwOTcyMTA5MzA2";const PWD_HASH="Y2QwOTMxMTUxMjAz";

function xorDec(enc, key) {
  const raw = atob(enc);
  let r = '';
  for (let i = 0; i < raw.length; i++) r += String.fromCharCode(raw.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  return r;
}

function tryUnlock() {
  const usr = document.getElementById('usrInput').value;const pwd = document.getElementById('pwInput').value;
  if (btoa(usr) === USR_HASH && btoa(pwd) === PWD_HASH) {
    initMap(pwd);
  } else {
    document.getElementById('errMsg').textContent = '密碼錯誤，請重試';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') tryUnlock(); });document.getElementById('usrInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pwInput').focus(); });

function initMap(pwd) {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('map').style.display = 'block';
  document.getElementById('fbar').style.display = 'flex';
  document.getElementById('sbox').style.display = 'block';

  const b64 = xorDec(ENC, pwd);
  const D = JSON.parse(atob(b64));

  const map = L.map('map', {zoomControl:true}).setView([33.4242,-111.9281], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'\u00a9 OSM \u00a9 CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);

  L.marker([33.4242,-111.9281], {icon:L.divIcon({className:'',
    html:'<div style="background:#8c1d40;color:#fff;padding:5px 10px;border-radius:6px;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">&#x1f3eb; ASU Tempe</div>',
    iconSize:[120,24],iconAnchor:[60,12]})}).addTo(map);

  const markers = [];
  D.forEach(p => {
    const rc = p.rating>=4?'#2e7d32':p.rating>=3?'#e65100':'#c62828';
    const ic = L.divIcon({className:'',
      html:'<div class="m-wrap"><div class="m-rating" style="color:'+rc+'">'+(p.rating>0?p.rating.toFixed(1):'?')+'</div><div class="m-icon c-'+p.conf+'">&#x1f3e2;</div></div>',
      iconSize:[40,44],iconAnchor:[20,44]});
    const hasFurn = p.furn==='Yes'||p.furn.includes('Yes')||p.furn.includes('有');
    const hasWifi = p.wifi.includes('含')||p.wifi.includes('WiFi')||p.wifi.includes('全含');
    const m = L.marker([parseFloat(p.lat),parseFloat(p.lng)],{icon:ic})
      .bindPopup('<div class="pt">'+p.name+'</div><div class="pp">1B:'+p.b1+' | 2B:'+p.b2+'</div><div class="pd">\u2b50'+p.rating+'('+p.reviews+') | '+(hasFurn?'\u1f6cb\ufe0f有':'\u1fa91無')+'傢俱 | '+(hasWifi?'\u1f4f6WiFi':'\u1f4f6自付')+'</div><button class="pb" onclick="window._openSB('+p.id+')">查看詳情</button>');
    m.pd = p; markers.push(m); m.addTo(map);
  });

  const legend = L.control({position:'bottomright'});
  legend.onAdd = function(){const d=L.DomUtil.create('div','legend');d.innerHTML='<h4>圖例</h4><div><span class="legend-dot" style="background:#4caf50"></span>\u1f7e2 三重驗證</div><div><span class="legend-dot" style="background:#ff9800"></span>\u1f7e1 雙重驗證</div><div style="margin-top:4px;font-size:11px;color:#999">共'+D.length+'個物件</div>';return d;};
  legend.addTo(map);

  window._openSB = function(id) {
    const p=D.find(x=>x.id===id);if(!p)return;
    const bOk=parsePrice(p.b1)<=1400;
    const b2Ok=parsePrice(p.b2)<=1800;
    const hasFurn=p.furn==='Yes'||p.furn.includes('Yes')||p.furn.includes('有');
    const hasWifi=p.wifi.includes('含')||p.wifi.includes('WiFi')||p.wifi.includes('全含');
    document.getElementById('sc').innerHTML=
      '<h2>'+p.name+'</h2><div class="addr">'+p.addr+'</div>'+
      '<div class="tags">'+
        (bOk?'<span class="tag tg">\u1f4b0 1B預算內</span>':'<span class="tag tr">\u1f4b0 1B超預算</span>')+
        (b2Ok?'<span class="tag tg">\u1f4b0 2B預算內</span>':'<span class="tag tr">\u1f4b0 2B超預算</span>')+
        (hasFurn?'<span class="tag tb">\u1f6cb\ufe0f 有傢俱</span>':'<span class="tag to">\u1fa91 無傢俱</span>')+
        (hasWifi?'<span class="tag tb">\u1f4f6 WiFi含</span>':'<span class="tag to">\u1f4f6 自付</span>')+
        (p.b2type==='all'?'<span class="tag tg">整間價(all)</span>':'')+
        (p.promo?'<span class="tag tgold">\u1f381 '+p.promo+'</span>':'')+
      '</div>'+
      '<div class="grid">'+
        '<div class="card"><div class="lb">Studio</div><div class="vl">'+p.studio+'</div></div>'+
        '<div class="card"><div class="lb">1B1B</div><div class="vl">'+p.b1+'</div></div>'+
        '<div class="card"><div class="lb">2B2B</div><div class="vl">'+p.b2+'</div></div>'+
        '<div class="card"><div class="lb">車位</div><div class="vl">'+p.parking+'</div></div>'+
        '<div class="card"><div class="lb">WiFi</div><div class="vl">'+p.wifi+'</div></div>'+
        '<div class="card"><div class="lb">傢俱</div><div class="vl">'+p.furn+'</div></div>'+
        '<div class="card"><div class="lb">最短租期</div><div class="vl">'+p.lease+'</div></div>'+
        '<div class="card"><div class="lb">\u2b50 評分</div><div class="vl">'+p.rating+' ('+p.reviews+'則)</div></div>'+
        '<div class="card"><div class="lb">2B定價</div><div class="vl">'+(p.b2type==='all'?'整間價':'per-bed')+'</div></div>'+
      '</div>'+
      '<div class="acts">'+
        (p.web&&p.web.startsWith('http')?'<a href="'+p.web+'" target="_blank" class="btn btn-p">\u1f310 查看官網</a>':'')+
        (p.phone&&p.phone!=='透過網站'?'<a href="tel:'+p.phone.replace(/[^0-9+]/g,'')+'" class="btn btn-c">\u1f4de '+p.phone+'</a>':'')+
        '<a href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.addr)+'" target="_blank" class="btn btn-s">\u1f5fa\ufe0f Google Maps</a>'+
      '</div>'+
      (p.note?'<div class="note">\u1f4dd '+p.note+'</div>':'')+
      '<div class="conf '+(p.conf==='triple'?'conf-t':'conf-d')+'">'+(p.conf==='triple'?'\u1f7e2 三重驗證':'\u1f7e1 雙重驗證')+'</div>';
    document.getElementById('sb').classList.add('open');map.closePopup();
  };
  window.closeSB = function(){document.getElementById('sb').classList.remove('open')};

  function parsePrice(s){if(!s||s==='N/A'||s==='需問')return 99999;const m=s.match(/\d[\d,]*/);return m?parseFloat(m[0].replace(',','')):99999}

  function applyF(){
    const confs=new Set();document.querySelectorAll('.fc:checked').forEach(c=>confs.add(c.value));
    const maxB1=parseInt(document.getElementById('r1').value);
    const maxB2=parseInt(document.getElementById('r2').value);
    const minStar=parseInt(document.getElementById('r3').value)/10;
    document.getElementById('r1v').textContent='$'+maxB1.toLocaleString();
    document.getElementById('r2v').textContent='$'+maxB2.toLocaleString();
    document.getElementById('r3v').textContent=minStar.toFixed(1)+'星';
    const furnF=document.getElementById('ff').checked;
    const wifiF=document.getElementById('fw').checked;
    const sq=document.getElementById('sq').value.toLowerCase();
    let vis=0;
    markers.forEach(m=>{
      const p=m.pd;let show=confs.has(p.conf);
      const p1=Math.min(parsePrice(p.studio),parsePrice(p.b1));
      const p2=parsePrice(p.b2);
      if(maxB1<2500)show=show&&p1<=maxB1;
      if(maxB2<3000)show=show&&p2<=maxB2;
      if(minStar>0)show=show&&p.rating>=minStar;
      if(furnF)show=show&&(p.furn==='Yes'||p.furn.includes('Yes')||p.furn.includes('有'));
      if(wifiF)show=show&&(p.wifi.includes('含')||p.wifi.includes('WiFi')||p.wifi.includes('全含'));
      if(sq)show=show&&(p.name.toLowerCase().includes(sq)||p.addr.toLowerCase().includes(sq));
      if(show&&!map.hasLayer(m))map.addLayer(m);
      if(!show&&map.hasLayer(m))map.removeLayer(m);
      if(show)vis++;
    });
    document.getElementById('r1v').textContent='$'+maxB1.toLocaleString()+' ('+vis+'個)';
  }
  document.querySelectorAll('.fc').forEach(c=>c.addEventListener('change',applyF));
  ['r1','r2','r3'].forEach(id=>document.getElementById(id).addEventListener('input',applyF));
  ['ff','fw'].forEach(id=>document.getElementById(id).addEventListener('change',applyF));
  document.getElementById('sq').addEventListener('input',applyF);
  map.on('click',function(){document.getElementById('sb').classList.remove('open')});
}

// Auto-unlock for localhost
if(['localhost','127.0.0.1',''].includes(location.hostname)){
  initMap("cd0931151203");
