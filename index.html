<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASU Tempe Apartments</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
#lockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
#lockScreen h1{font-size:28px;color:#333}
#lockScreen p{color:#888;font-size:14px}
#lockScreen input{padding:12px 20px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;width:280px;text-align:center;outline:none;margin-bottom:4px}
#lockScreen input:focus{border-color:#4caf50}
#lockScreen button{padding:12px 40px;background:#4caf50;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
#lockScreen .err{color:#f44336;font-size:13px;min-height:20px}
#lockScreen .hint{color:#bbb;font-size:12px}
#map{width:100%;height:100vh;display:none}
.m-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.m-rating{font-size:10px;font-weight:700;background:rgba(255,255,255,.92);padding:1px 4px;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.2);white-space:nowrap}
.m-icon{display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:50%;width:30px;height:30px;box-shadow:0 2px 6px rgba(0,0,0,.35);border:2.5px solid #fff;cursor:pointer;transition:transform .15s}
.m-icon:hover{transform:scale(1.3)}
.c-triple{background:#4caf50}.c-double{background:#ff9800}
.fbar{position:fixed;top:10px;left:50px;z-index:1000;background:rgba(255,255,255,.96);border-radius:12px;padding:10px 16px;box-shadow:0 2px 12px rgba(0,0,0,.12);display:none;gap:12px;flex-wrap:wrap;align-items:center;font-size:13px;backdrop-filter:blur(8px)}
.fbar label{cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.fbar .dv{width:1px;height:28px;background:#ddd}
.rg{display:flex;flex-direction:column;gap:2px;min-width:155px}
.rg .rl{font-size:11px;color:#666;display:flex;justify-content:space-between}
.rg .rl span{font-weight:700;color:#2e7d32;font-size:12px}
.rg input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#4caf50,#ff9800,#f44336);outline:none;cursor:pointer}
.rg input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #4caf50;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sbox{position:fixed;top:10px;right:10px;z-index:1000;background:rgba(255,255,255,.96);border-radius:10px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,.12);display:none;backdrop-filter:blur(8px)}
.sbox input{border:1px solid #e0e0e0;padding:7px 10px;border-radius:6px;width:180px;font-size:13px;outline:none}
.sb{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);overflow-y:auto;transition:right .3s cubic-bezier(.4,0,.2,1);z-index:1001;padding:24px}
.sb.open{right:0}
.sb-close{position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:#999}
.sb h2{font-size:20px;margin-bottom:4px;padding-right:40px;line-height:1.3}
.sb .addr{color:#888;font-size:13px;margin-bottom:14px}
.sb .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sb .card{background:#f8f9fa;padding:10px;border-radius:8px}
.sb .card .lb{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.sb .card .vl{font-size:14px;font-weight:600;margin-top:2px}
.sb .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.sb .tag{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500}
.tg{background:#e8f5e9;color:#2e7d32}.to{background:#fff3e0;color:#e65100}.tr{background:#ffebee;color:#c62828}.tb{background:#e3f2fd;color:#1565c0}.tgold{background:#fff8e1;color:#f57f17;border:1px solid #ffd54f}
.sb .acts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sb .btn{display:block;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-weight:600;font-size:14px}
.bp{background:#1976d2;color:#fff}.bc{background:#2e7d32;color:#fff}.bs{background:#f5f5f5;color:#333;border:1px solid #e0e0e0}
.sb .note{padding:10px;background:#fffde7;border-radius:8px;font-size:12px;color:#666;line-height:1.5;margin-bottom:8px}
.sb .conf{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:500}
.ct{background:#e8f5e9;color:#2e7d32}.cd{background:#fff3e0;color:#e65100}
.leaflet-popup-content{margin:8px 12px;min-width:200px}
.pt{font-weight:700;font-size:14px;margin-bottom:3px}.pp{color:#2e7d32;font-weight:600;font-size:13px}.pd{font-size:11px;color:#666;margin-top:3px;line-height:1.5}
.pb{display:inline-block;margin-top:6px;padding:5px 14px;background:#1976d2;color:#fff;border-radius:5px;font-size:11px;cursor:pointer;border:none;font-weight:600}
.legend{background:rgba(255,255,255,.95);padding:12px 16px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-size:12px;line-height:2;backdrop-filter:blur(8px)}
.legend h4{font-size:13px;margin-bottom:4px}.ld{width:14px;height:14px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);vertical-align:middle;margin-right:6px}
@media(max-width:768px){.sb{width:100%;right:-100%}.fbar{left:8px;right:8px;top:auto;bottom:8px;justify-content:center;font-size:11px}.sbox{top:8px;left:50px;right:8px}.sbox input{width:100%}}
</style>
</head>
<body>
<div id="lockScreen">
  <h1>ASU Tempe Apartments</h1>
  <p>Login required</p>
  <input type="text" id="usrInput" placeholder="Username..." autofocus>
  <input type="password" id="pwInput" placeholder="Password...">
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;cursor:pointer;user-select:none;width:auto"><input type="checkbox" id="rememberMe" style="width:auto;margin:0;padding:0"> Remember me</label>
  <button onclick="tryUnlock()">Login</button>
  <div class="err" id="errMsg"></div>
  <div class="hint">115 verified | DC & GF</div>
</div>
<div id="map"></div>
<div class="fbar" id="fbar">
  <label><input type="checkbox" checked class="fc" value="triple"> Triple verified</label>
  <label><input type="checkbox" checked class="fc" value="double"> Double verified</label>
  <span class="dv"></span>
  <div class="rg"><div class="rl">Studio/1B max: <span id="r1v">$1,100</span></div><input type="range" id="r1" min="600" max="2500" value="1100" step="50"></div>
  <div class="rg"><div class="rl">2B max: <span id="r2v">$1,800</span></div><input type="range" id="r2" min="800" max="3000" value="1800" step="50"></div>
  <span class="dv"></span>
  <div class="rg" style="min-width:120px"><div class="rl">Min stars: <span id="r3v">4.0 stars</span></div><input type="range" id="r3" min="0" max="48" value="40" step="1" style="background:linear-gradient(to right,#f44336,#ff9800,#4caf50)"></div>
  <span class="dv"></span>
  <label><input type="checkbox" id="ff"> Furnished</label>
  <label><input type="checkbox" id="fw"> WiFi incl.</label>
</div>
<div class="sbox" id="sbox"><input type="text" id="sq" placeholder="Search name or address..."></div>
<div class="sb" id="sb"><button class="sb-close" onclick="closeSB()">X</button><div id="sc"></div></div>

  document.getElementById("sbox").style.display="block";
  var D=JSON.parse(atob(ENC));
  var map=L.map("map",{zoomControl:true}).setView([33.4242,-111.9281],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:"OSM+CARTO",subdomains:"abcd",maxZoom:19}).addTo(map);
  L.marker([33.4242,-111.9281],{icon:L.divIcon({className:"",html:"<div style='background:#8c1d40;color:#fff;padding:5px 10px;border-radius:6px;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)'>ASU Tempe</div>",iconSize:[100,24],iconAnchor:[50,12]})}).addTo(map);
  var markers=[];
  D.forEach(function(p){
    var rc=p.rating>=4.5?"#1b5e20":p.rating>=4?"#2e7d32":p.rating>=3.5?"#e65100":"#c62828";
    var ic=L.divIcon({className:"",html:"<div class='m-wrap'><div class='m-rating' style='color:"+rc+"'>"+(p.rating>0?p.rating.toFixed(1):"?")+"</div><div class='m-icon c-"+p.conf+"'>H</div></div>",iconSize:[40,44],iconAnchor:[20,44]});
    var hf=p.furn&&(p.furn==="Yes"||p.furn.indexOf("Yes")>=0||p.furn.indexOf("有")>=0);
    var hw=p.wifi&&(p.wifi.indexOf("含")>=0||p.wifi.indexOf("WiFi")>=0||p.wifi.indexOf("全含")>=0);
    var m=L.marker([parseFloat(p.lat),parseFloat(p.lng)],{icon:ic}).bindPopup("<div class='pt'>"+p.name+"</div><div class='pp'>Studio:"+p.studio+" | 1B:"+p.b1+"</div><div class='pd'>"+p.rating+" stars("+p.reviews+"r) | "+(hf?"有":"無")+"Furniture | "+(hw?"WiFi incl.":"WiFi: tenant pays")+"</div><button class='pb' onclick='window._openSB("+p.id+")'>Details</button>");
    m.pd=p;markers.push(m);m.addTo(map);
  });
  var legend=L.control({position:"bottomright"});
  legend.onAdd=function(){var d=L.DomUtil.create("div","legend");d.innerHTML="<h4>圖例</h4><div><span class='ld' style='background:#4caf50'></span>Triple verified</div><div><span class='ld' style='background:#ff9800'></span>Double verified</div><div style='margin-top:4px;font-size:11px;color:#999'>Total: "+D.length+" verified<br>Default: 4star + $1,100</div>";return d;};
  legend.addTo(map);
  function pp(s){if(!s||s==="N/A"||s==="需問"||s.indexOf("N/A")>=0)return 99999;var m=s.match(/[\d,]+/);return m?parseFloat(m[0].replace(",","")):99999;}
  window._openSB=function(id){
    var p=D.find(function(x){return x.id===id;});if(!p)return;
    var bOk=Math.min(pp(p.studio),pp(p.b1))<=1100;
    var b2Ok=pp(p.b2)<=1800;
    var hf=p.furn&&(p.furn==="Yes"||p.furn.indexOf("Yes")>=0||p.furn.indexOf("有")>=0);
    var hw=p.wifi&&(p.wifi.indexOf("含")>=0||p.wifi.indexOf("WiFi")>=0||p.wifi.indexOf("全含")>=0);
    document.getElementById("sc").innerHTML=
      "<h2>"+p.name+"</h2><div class='addr'>"+p.addr+"</div>"+
      "<div class='tags'>"+
        (bOk?"<span class='tag tg'>1B under $1,100</span>":"<span class='tag tr'>1B over $1,100</span>")+
        (b2Ok?"<span class='tag tg'>2B under $1,800</span>":"<span class='tag tr'>2B over $1,800</span>")+
        (hf?"<span class='tag tb'>Furnished</span>":"<span class='tag to'>No furniture</span>")+
        (hw?"<span class='tag tb'>WiFi incl.</span>":"<span class='tag to'>WiFi: tenant pays</span>")+
        (p.b2type==="all"?"<span class='tag tg'>Per unit (all)</span>":"")+
        (p.promo?"<span class='tag tgold'>"+p.promo+"</span>":"")+
      "</div>"+
      "<div class='grid'>"+
        "<div class='card'><div class='lb'>STUDIO</div><div class='vl'>"+p.studio+"</div></div>"+
        "<div class='card'><div class='lb'>1B1B</div><div class='vl'>"+p.b1+"</div></div>"+
        "<div class='card'><div class='lb'>2B2B</div><div class='vl'>"+p.b2+"</div></div>"+
        "<div class='card'><div class='lb'>Parking</div><div class='vl'>"+p.parking+"</div></div>"+
        "<div class='card'><div class='lb'>WIFI</div><div class='vl'>"+p.wifi+"</div></div>"+
        "<div class='card'><div class='lb'>Furniture</div><div class='vl'>"+p.furn+"</div></div>"+
        "<div class='card'><div class='lb'>Min lease</div><div class='vl'>"+p.lease+"</div></div>"+
        "<div class='card'><div class='lb'>Rating</div><div class='vl'>"+p.rating+" ("+p.reviews+"r)</div></div>"+
        "<div class='card'><div class='lb'>2B pricing</div><div class='vl'>"+(p.b2type==="all"?"Per unit":"per-bed")+"</div></div>"+
      "</div>"+
      "<div class='acts'>"+
        (p.web&&p.web.indexOf("http")===0?"<a href='"+p.web+"' target='_blank' class='btn bp'>Official Site</a>":"")+
        (p.phone&&p.phone!=="透過網站"?"<a href='tel:"+p.phone.replace(/[^0-9+]/g,"")+"' class='btn bc'>"+p.phone+"</a>":"")+
        "<a href='https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(p.addr)+"' target='_blank' class='btn bs'>Google Maps</a>"+
      "</div>"+
      (p.note?"<div class='note'>"+p.note+"</div>":"")+
      "<div class='conf "+(p.conf==="triple"?"ct":"cd")+"'>"+(p.conf==="triple"?"Triple verified(最高可信)":"Double verified")+"</div>";
    document.getElementById("sb").classList.add("open");map.closePopup();
  };
  window.closeSB=function(){document.getElementById("sb").classList.remove("open");};
  function applyF(){
    var confs={};document.querySelectorAll(".fc:checked").forEach(function(c){confs[c.value]=true;});
    var mx1=parseInt(document.getElementById("r1").value);
    var mx2=parseInt(document.getElementById("r2").value);
    var ms=parseInt(document.getElementById("r3").value)/10;
    document.getElementById("r1v").textContent="$"+mx1.toLocaleString();
    document.getElementById("r2v").textContent="$"+mx2.toLocaleString();
    document.getElementById("r3v").textContent=ms.toFixed(1)+" stars";
    var ff=document.getElementById("ff").checked;
    var fw=document.getElementById("fw").checked;
    var sq=document.getElementById("sq").value.toLowerCase();
    var vis=0;
    markers.forEach(function(m){
      var p=m.pd,show=!!confs[p.conf];
      var p1=Math.min(pp(p.studio),pp(p.b1)),p2=pp(p.b2);
      if(mx1<2500)show=show&&p1<=mx1;
      if(mx2<3000)show=show&&p2<=mx2;
      if(ms>0)show=show&&p.rating>=ms;
      if(ff)show=show&&p.furn&&(p.furn==="Yes"||p.furn.indexOf("Yes")>=0||p.furn.indexOf("有")>=0);
      if(fw)show=show&&p.wifi&&(p.wifi.indexOf("含")>=0||p.wifi.indexOf("WiFi")>=0||p.wifi.indexOf("全含")>=0);
      if(sq)show=show&&(p.name.toLowerCase().indexOf(sq)>=0||p.addr.toLowerCase().indexOf(sq)>=0);
      if(show&&!map.hasLayer(m))map.addLayer(m);
      if(!show&&map.hasLayer(m))map.removeLayer(m);
      if(show)vis++;
    });
    document.getElementById("r1v").textContent="$"+mx1.toLocaleString()+" ("+vis+"個)";
  }
  document.querySelectorAll(".fc").forEach(function(c){c.addEventListener("change",applyF);});
  ["r1","r2","r3"].forEach(function(id){document.getElementById(id).addEventListener("input",applyF);});
  ["ff","fw"].forEach(function(id){document.getElementById(id).addEventListener("change",applyF);});
  document.getElementById("sq").addEventListener("input",applyF);
  map.on("click",function(){document.getElementById("sb").classList.remove("open");});
  applyF();
}
if(["localhost","127.0.0.1",""].indexOf(location.hostname)>=0){initMap();}
</script>
