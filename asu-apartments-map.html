const allMarkers = [];

properties.forEach(p => {
  const icon = makeIcon(p.cat, p.conf, p.apollo);
  const marker = L.marker([p.lat, p.lng], { icon, zIndexOffset: p.apollo ? 1000 : 0 })
    .bindPopup(`
      <div class="popup-title">${p.apollo ? '⭐ ' : ''}${p.name}</div>
      <div class="popup-price">${p.price}</div>
      <div class="popup-detail">
        ${EMOJIS[p.cat]} ${p.types}<br>
        ${p.furnished ? '✅ Furnished' : '🪑 無家具'} | ${p.parking ? '🅿️ 有停車' : '🅿️ 無'}
      </div>
      <button class="popup-btn" onclick="openSidebar(${p.id})">查看詳情</button>
    `);
  marker.propertyData = p;
  allMarkers.push(marker);
  marker.addTo(map);
});

// Sidebar
const CAT_LABELS = { student:'🎓 學生公寓', general:'🏢 一般公寓', furnished:'🛋️ 短租/Furnished', platform:'📱 搜尋平台' };

function openSidebar(id) {
  const p = properties.find(x => x.id === id);
  if (!p) return;
  const budgetTag = p.priceNum <= 1400 ? '<span class="tag tag-green">💰 預算內</span>' : '<span class="tag tag-red">💰 超預算</span>';
  const furnTag = p.furnished ? '<span class="tag tag-blue">🛋️ Furnished</span>' : '<span class="tag tag-orange">🪑 無家具</span>';
  const parkTag = p.parking ? '<span class="tag tag-blue">🅿️ 有停車</span>' : '';
  const shortTag = p.shortTerm.includes('✅') ? '<span class="tag tag-green">📅 短租確認</span>' : '<span class="tag tag-purple">📅 需詢問短租</span>';
  const promoTag = p.promo ? `<span class="tag tag-gold">🎁 ${p.promo}</span>` : '';
  const apolloTag = p.apollo ? '<span class="tag tag-gold">⭐ DC 指定研究</span>' : '';
  const confBadgeClass = p.conf === 'high' ? 'high' : p.conf === 'mid' ? 'mid' : 'low';

  document.getElementById('sidebar-content').innerHTML = `
    <h2>${p.apollo ? '⭐ ' : ''}${p.name}</h2>
    <div class="address">${p.addr}</div>
    <div class="tags">${apolloTag}${budgetTag}${furnTag}${parkTag}${shortTag}${promoTag}</div>
    <div class="info-grid">
      <div class="info-card"><div class="label">月租金</div><div class="value">${p.price}</div></div>
      <div class="info-card"><div class="label">房型</div><div class="value">${p.types}</div></div>
      <div class="info-card"><div class="label">短租</div><div class="value">${p.shortTerm}</div></div>
      <div class="info-card"><div class="label">類型</div><div class="value">${CAT_LABELS[p.cat]}</div></div>
    </div>
    <div class="actions">
      ${p.web.startsWith('http') ? `<a href="${p.web}" target="_blank" class="btn btn-primary">🌐 查看官網</a>` : `<div class="btn btn-secondary">🌐 ${p.web}</div>`}
      ${p.phone !== '—' && p.phone !== '透過網站' && p.phone !== '詢問' ? `<a href="tel:${p.phone.replace(/[^0-9+]/g,'')}" class="btn btn-call">📞 ${p.phone}</a>` : ''}
      <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.addr)}" target="_blank" class="btn btn-secondary">🗺️ Google Maps</a>
    </div>
    ${p.note ? `<div class="note">📝 ${p.note}</div>` : ''}
    <div class="conf-badge ${confBadgeClass}">${CONF_LABEL[p.conf]}</div>
  `;
  document.getElementById('sidebar').classList.add('open');
  map.closePopup();
}

function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

// Filters
document.querySelectorAll('.filter-bar input[data-cat]').forEach(cb => cb.addEventListener('change', applyFilters));
document.querySelectorAll('.filter-bar input[data-conf]').forEach(cb => cb.addEventListener('change', applyFilters));
document.getElementById('filter-budget').addEventListener('change', applyFilters);
document.getElementById('search').addEventListener('input', applyFilters);

function applyFilters() {
  const activeCats = new Set();
  document.querySelectorAll('.filter-bar input[data-cat]:checked').forEach(cb => activeCats.add(cb.dataset.cat));
  const activeConfs = new Set();
  document.querySelectorAll('.filter-bar input[data-conf]:checked').forEach(cb => activeConfs.add(cb.dataset.conf));
  const budgetOnly = document.getElementById('filter-budget').checked;
  const searchTerm = document.getElementById('search').value.toLowerCase();

  allMarkers.forEach(m => {
    const p = m.propertyData;
    const show = activeCats.has(p.cat) && activeConfs.has(p.conf)
      && (!budgetOnly || p.priceNum <= 1400)
      && (!searchTerm || p.name.toLowerCase().includes(searchTerm) || p.addr.toLowerCase().includes(searchTerm));
    if (show && !map.hasLayer(m)) map.addLayer(m);
    if (!show && map.hasLayer(m)) map.removeLayer(m);
  });
}

map.on('click', closeSidebar);
